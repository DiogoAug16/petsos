<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="refresh" content="0; url=petsos_documentacao.html" />
<title>PetSOS Docs</title>
<style>
:root {
  --bg:#f3f5f8;
  --card:#ffffff;
  --ink:#1f2937;
  --muted:#6b7280;
  --line:#d6dbe3;
  --blue:#1d4ed8;
}
* { box-sizing:border-box; }
body {
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--ink);
}
main {
  width:min(520px, calc(100vw - 32px));
  background:var(--card);
  border:1px solid var(--line);
  padding:24px;
}
h1 { margin:0 0 8px; font-size:1.4rem; }
p { margin:0 0 18px; color:var(--muted); line-height:1.5; }
a {
  display:inline-flex;
  min-height:38px;
  align-items:center;
  padding:0 14px;
  background:var(--blue);
  color:#fff;
  text-decoration:none;
  font-weight:700;
}
a:focus-visible { outline:3px solid rgba(96,165,250,.38); outline-offset:2px; }
</style>
</head>
<body>
  <main>
    <h1>PetSOS Docs</h1>
    <p>Redirecionando para a documentação técnica do projeto.</p>
    <a href="petsos_documentacao.html">Abrir documentação</a>
  </main>
</body>
</html>
